version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: pdf_agent
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: '["http://localhost", "http://localhost:80"]'
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # ── Vue 3 frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mongo_data:
  uploads:
