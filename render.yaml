services:
  # ── Backend API ────────────────────────────────────────────────────────
  - type: web
    name: pdf-extraction-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: UPLOAD_DIR
        value: /tmp/pdf_uploads
      - key: CORS_ORIGINS
        value: '["https://pdf-extraction-frontend.onrender.com", "http://localhost:5173"]'
      - key: ACTIVE_PROVIDER
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LLAMA_CLOUD_API_KEY
        sync: false

  # ── Frontend static site ───────────────────────────────────────────────
  - type: web
    name: pdf-extraction-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://pdf-extraction-agent.onrender.com/api/v1
